# ---- Software ----------------------------------------------------------
software:
  intro_html: 'Code accompanying published analyses, on <a href="https://github.com/chauhan7892">GitHub</a>.'
  repos:
    - meta: "Python"
      name: "Saturation_Mutagenesis"
      description: "Saturation mutagenesis analysis code underlying the CSRP3/LIM-domain virtual mutagenesis study."
      url: "https://github.com/chauhan7892/Saturation_Mutagenesis"
    - meta: "Shell · Nextflow"
      name: "SM_Nextflow"
      description: "Nextflow implementation of the Saturation_Mutagenesis workflow for reproducible runs."
      url: "https://github.com/chauhan7892/SM_Nextflow"
    - meta: "Python"
      name: "CSRP3_mutational"
      description: "Mutational analysis code for the CSRP3 LIM-domain cardiomyopathy work."
      url: "https://github.com/chauhan7892/CSRP3_mutational"
    - meta: "Python"
      name: "CardiacDiseasome"
      description: "Network analysis code for the cardiomyopathy diseasome study (Sci Rep 2022)."
      url: "https://github.com/chauhan7892/CardiacDiseasome"
    - meta: "Python"
      name: "Cardiac_Mutant"
      description: "Supporting code for cardiomyopathy mutation modelling."
      url: "https://github.com/chauhan7892/Cardiac_Mutant"
    - meta: "Python · NCBS"
      name: "Domain_Swapping"
      description: "Analysis code from early graduate work on protein domain swapping (Inbix'17 poster)."
      url: "https://github.com/chauhan7892/Domain_Swapping"

