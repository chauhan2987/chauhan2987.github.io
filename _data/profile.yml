# ---- Research projects & timeline --------------------------------------
research_projects:
  - date_range: "Dec 2024 – present"
    tags: ["Translational"]
    title: "Germline risk variants in kidney cancer"
    description: "Analysis and pipeline development to identify germline risk variants in renal medullary carcinoma–unclassified (RCCU-MP) and other kidney cancers, with Dr. Pavlos Msaouel."
  - date_range: "Jul 2025 – present"
    tags: ["Translational"]
    title: "Body composition in the C-COLA cohort"
    description: "Body composition analysis of the C-COLA cohort, with Dr. Andrew Hahn."
  - date_range: "Jul 2024 – Sep 2025"
    tags: ["Translational"]
    title: "Cardiovascular risk in prostate cancer"
    description: "Analysis of cardiovascular risk in localized high-risk/locally advanced prostate cancer (LHRPCa), with Dr. Andrew Hahn."
  - date_range: "Sep 2024 – Apr 2025"
    tags: ["Deployment"]
    title: "Body composition & response to immunotherapy"
    description: "Body composition and response to nivolumab/ipilimumab in metastatic clear cell renal cell carcinoma (mccRCC)."
  - date_range: "Dec 2023 – Jan 2025"
    tags: ["Methods", "Infrastructure"]
    title: "Preclinical RMC/FH-deficient RCC therapeutics"
    description: "RNA-seq analysis and pipeline development for a study of differential efficacy of bevacizumab and erlotinib in preclinical models of renal medullary carcinoma and fumarate-hydratase-deficient RCC."

