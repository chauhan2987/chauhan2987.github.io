# ---- Hero ------------------------------------------------------------
hero:
  eyebrow: "Bioinformatics · Cancer Genomics · Genitourinary Oncology"
  headline_html: "Finding the genomic signal<br>behind kidney and prostate <em>cancer outcomes.</em>"
  lede_html: >
    Pankaj Kumar Chauhan, PhD is a postdoctoral fellow in Genitourinary
    Medical Oncology — Research at UT MD Anderson Cancer Center, building
    bioinformatics pipelines for germline risk-variant discovery, RNA-seq
    analysis, and body-composition outcomes research in renal medullary
    carcinoma, kidney cancer, and prostate cancer.

# ---- About -----------------------------------------------------------
about:
  paragraphs_html:
    - >
      I am a postdoctoral fellow in <strong>Genitourinary Medical Oncology
      — Research</strong> at The University of Texas MD Anderson Cancer
      Center, working on the genomics and bioinformatics of kidney and
      prostate cancer. My current work spans the identification of
      <strong>germline risk variants</strong> in renal medullary carcinoma
      and other kidney cancers, RNA-seq analysis of preclinical
      drug-response models, and the influence of <strong>body
      composition</strong> on outcomes in immunotherapy and hormone-therapy
      cohorts.
    - >
      I trained as a computational/structural biologist — my PhD at the
      Tata Institute of Fundamental Research used molecular dynamics,
      network analysis, and transcriptome data to study LIM-domain protein
      structure and cardiomyopathy genetics, and I previously worked in
      plant systems biology and radiation-stress proteomics.
    - >
      I care about <em>reproducible</em> pipelines, <em>careful</em>
      statistical practice, and translating genomic findings into
      something a clinical collaborator can actually use.
